# データ自動更新ワークフロー（テンプレート）
#
# 現在は手動実行（workflow_dispatch）のみ有効です。
# scripts/scrape_all.py を実装したら、下記の手順でスケジュール実行を有効化してください：
#   1. schedule ブロックのコメントを外す
#   2. jobs.update-data 内のコメントアウトされたステップを有効化する

name: データ自動更新

on:
